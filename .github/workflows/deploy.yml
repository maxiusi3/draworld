name: Deploy WhimsyBrush to Firebase

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

env:
  NODE_VERSION: '18'

jobs:
  # 构建和测试作业
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: latest

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install frontend dependencies
      run: pnpm install --frozen-lockfile

    - name: Install functions dependencies
      run: |
        cd functions
        npm ci

    - name: Lint code
      run: pnpm lint
      continue-on-error: true

    - name: Build frontend
      run: pnpm build

    - name: Build functions
      run: |
        cd functions
        npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: |
          dist/
          functions/lib/
        retention-days: 1

  # 部署作业
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    
    environment: 
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.details_url }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-files
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install Firebase CLI
      run: npm install -g firebase-tools
    
    - name: Create service account file
      run: |
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > ${{ github.workspace }}/service-account.json
    
    - name: Authenticate with Firebase
      run: |
        export GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json
        firebase use ${{ secrets.FIREBASE_PROJECT_ID }}
    
    - name: Set Firebase Functions configuration
      run: |
        export GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json
        # 尝试设置Functions配置，如果失败则继续（可能权限不足或已存在）
        firebase functions:config:set \
          dreamina.access_key_id="${{ secrets.DREAMINA_ACCESS_KEY_ID }}" \
          dreamina.secret_access_key="${{ secrets.DREAMINA_SECRET_ACCESS_KEY }}" \
          --project ${{ secrets.FIREBASE_PROJECT_ID }} || echo "⚠️ 无法设置Functions配置，可能已存在或权限不足，继续部署..."
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      continue-on-error: true
    
    - name: Create deployment-safe firebase.json
      run: |
        # 备份原始firebase.json
        cp firebase.json firebase.json.backup

        # 创建一个不包含storage的临时配置（如果storage未启用）
        cat > firebase.json << 'EOF'
        {
          "hosting": {
            "public": "dist",
            "ignore": [
              "firebase.json",
              "**/.*",
              "**/node_modules/**"
            ],
            "rewrites": [
              {
                "source": "**",
                "destination": "/index.html"
              }
            ]
          },
          "functions": {
            "source": "functions",
            "runtime": "nodejs18"
          },
          "firestore": {
            "rules": "firestore.rules",
            "indexes": "firestore.indexes.json"
          }
        }
        EOF

    - name: Deploy to Firebase
      id: deploy
      run: |
        export GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json

        echo "� 开始部署Firebase服务..."
        firebase deploy --project ${{ secrets.FIREBASE_PROJECT_ID }} --non-interactive

        echo "✅ Firebase部署完成！"
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    - name: Restore original firebase.json
      if: always()
      run: |
        if [ -f firebase.json.backup ]; then
          mv firebase.json.backup firebase.json
        fi
    
    - name: Clean up service account file
      if: always()
      run: rm -f ${{ github.workspace }}/service-account.json
    
    - name: Get deployment URL
      id: get-url
      run: |
        PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}"
        HOSTING_URL="https://${PROJECT_ID}.web.app"
        echo "url=${HOSTING_URL}" >> $GITHUB_OUTPUT
        echo "Deployment URL: ${HOSTING_URL}"
    
    - name: Comment deployment URL on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🚀 **部署完成！**\n\n预览地址: ${{ steps.get-url.outputs.url }}\n\n部署时间: ' + new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})
          })

  # 部署验证作业
  verify-deployment:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install Firebase CLI
      run: npm install -g firebase-tools
    
    - name: Create service account file
      run: |
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > ${{ github.workspace }}/service-account.json
    
    - name: Verify deployment
      run: |
        export GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json
        
        # 检查网站可访问性
        PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}"
        HOSTING_URL="https://${PROJECT_ID}.web.app"
        
        echo "检查网站可访问性: $HOSTING_URL"
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HOSTING_URL" || echo "000")
        
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "✅ 网站可正常访问"
        else
          echo "❌ 网站访问异常 (HTTP $HTTP_STATUS)"
          exit 1
        fi
        
        # 检查Functions状态
        echo "检查Cloud Functions状态..."
        firebase functions:list --project ${{ secrets.FIREBASE_PROJECT_ID }} --json > functions_status.json
        
        if grep -q "createVideoTask" functions_status.json; then
          echo "✅ createVideoTask 函数部署成功"
        else
          echo "❌ createVideoTask 函数未找到"
          exit 1
        fi
        
        if grep -q "getUserVideoTasks" functions_status.json; then
          echo "✅ getUserVideoTasks 函数部署成功"
        else
          echo "❌ getUserVideoTasks 函数未找到"
          exit 1
        fi
        
        echo "🎉 部署验证完成！"
    
    - name: Clean up
      if: always()
      run: |
        rm -f ${{ github.workspace }}/service-account.json
        rm -f functions_status.json
    
    - name: Notify deployment success
      if: success()
      run: |
        PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}"
        HOSTING_URL="https://${PROJECT_ID}.web.app"
        echo "🎉 童画奇旅部署成功！"
        echo "🌐 网站地址: $HOSTING_URL"
        echo "🔧 Firebase控制台: https://console.firebase.google.com/project/$PROJECT_ID"
