name: Deploy WhimsyBrush to Firebase

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

env:
  NODE_VERSION: '20'

jobs:
  # 构建和测试作业
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: latest

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run tests
      run: pnpm test
      continue-on-error: true

    - name: Build project
      run: pnpm build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: dist/
        retention-days: 1

  # 部署作业
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-files
        path: dist/

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install Firebase CLI
      run: npm install -g firebase-tools

    - name: Create service account file
      run: |
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > ${{ github.workspace }}/service-account.json
        # 验证JSON格式
        cat ${{ github.workspace }}/service-account.json | jq . > /dev/null || (echo "❌ Invalid JSON in service account key" && exit 1)
        echo "✅ Service account file created successfully"

        # 显示service account信息（不显示敏感内容）
        echo "📋 Service account info:"
        cat ${{ github.workspace }}/service-account.json | jq -r '.client_email // "No client_email found"'
        cat ${{ github.workspace }}/service-account.json | jq -r '.project_id // "No project_id found"'

    - name: Deploy to Firebase Hosting
      id: deploy
      run: |
        echo "🚀 开始部署Firebase Hosting..."

        # 设置Google Application Credentials
        export GOOGLE_APPLICATION_CREDENTIALS="${{ github.workspace }}/service-account.json"
        echo "📍 Using credentials file: $GOOGLE_APPLICATION_CREDENTIALS"

        # 显示项目信息
        echo "📋 Target project: ${{ secrets.FIREBASE_PROJECT_ID }}"

        # 验证认证 - 显示详细错误信息
        echo "🔐 Testing Firebase authentication..."
        if firebase projects:list --json > /tmp/projects.json 2>/tmp/error.log; then
          echo "✅ Firebase authentication successful"
          echo "📋 Available projects:"
          cat /tmp/projects.json | jq -r '.[] | .projectId' || echo "Could not parse projects"
        else
          echo "❌ Firebase authentication failed"
          echo "Error details:"
          cat /tmp/error.log || echo "No error log available"
          exit 1
        fi

        # 显示当前目录和文件
        echo "📁 Current directory: $(pwd)"
        echo "📋 Files in current directory:"
        ls -la
        echo "📋 Firebase config:"
        cat firebase.json || echo "No firebase.json found"

        # 先部署Hosting和Firestore规则
        echo "🚀 Starting deployment (Hosting + Firestore rules)..."
        if firebase deploy --only hosting,firestore:rules --project ${{ secrets.FIREBASE_PROJECT_ID }} --non-interactive; then
          echo "✅ Hosting and Firestore rules deployed successfully"
        else
          echo "❌ Failed to deploy Hosting and Firestore rules"
          exit 1
        fi

        # 安装Functions依赖并构建
        echo "📦 Installing Functions dependencies..."
        cd functions
        if npm install; then
          echo "✅ Functions dependencies installed"
        else
          echo "❌ Failed to install Functions dependencies"
          exit 1
        fi

        if npm run build; then
          echo "✅ Functions built successfully"
        else
          echo "❌ Failed to build Functions"
          exit 1
        fi
        cd ..

        # 使用gcloud直接部署Functions，绕过Firebase CLI
        echo "🚀 Deploying Functions using gcloud..."

        # 设置gcloud认证
        echo "🔐 Setting up gcloud authentication..."
        gcloud auth activate-service-account --key-file=${{ github.workspace }}/service-account.json
        gcloud config set project ${{ secrets.FIREBASE_PROJECT_ID }}

        # 验证gcloud认证
        echo "✅ gcloud authentication configured"
        gcloud auth list
        gcloud config list

        # 部署每个函数 - 使用Firebase CLI而不是gcloud，因为这些是Callable Functions
        echo "📤 Deploying Functions using Firebase CLI..."

        # 设置环境变量到functions配置
        echo "🔧 Setting up environment variables..."
        firebase functions:config:set \
          dreamina.access_key_id="${{ secrets.DREAMINA_ACCESS_KEY_ID }}" \
          dreamina.secret_access_key="${{ secrets.DREAMINA_SECRET_ACCESS_KEY }}" \
          --project=${{ secrets.FIREBASE_PROJECT_ID }} || echo "⚠️ Failed to set config"

        # 部署所有Functions
        echo "📤 Deploying all Functions..."
        firebase deploy --only functions --project=${{ secrets.FIREBASE_PROJECT_ID }} --non-interactive || echo "⚠️ Functions deployment failed"

        echo "✅ Functions deployment completed"

        echo "✅ Firebase部署完成！"
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json

    - name: Clean up service account file
      if: always()
      run: |
        if [ -f "${{ github.workspace }}/service-account.json" ]; then
          rm "${{ github.workspace }}/service-account.json"
          echo "🧹 Service account file cleaned up"
        fi



    - name: Get deployment URL
      if: success()
      run: |
        echo "🌐 部署完成！"
        echo "访问地址: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"
        echo "或者: https://${{ secrets.FIREBASE_PROJECT_ID }}.firebaseapp.com"

    - name: Comment deployment URL on PR
      if: github.event_name == 'pull_request' && success()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🚀 **部署成功！**
            
            预览地址: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app
            
            构建时间: ${new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})}`
          })

    - name: Post Setup Node.js
      if: success()
      run: |
        echo "Node.js version: $(node --version)"
        echo "npm version: $(npm --version)"

    - name: Post Checkout repository
      if: success()
      run: |
        echo "Repository checked out successfully"
        echo "Current directory: $(pwd)"
        echo "Files in current directory:"
        ls -la

    - name: Complete job
      if: success()
      run: |
        echo "🎉 所有部署步骤完成！"
        echo "项目已成功部署到Firebase Hosting"
