name: Deploy to Aliyun (FC + OSS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true
        submodules: recursive

    - name: Debug - Check repository structure
      run: |
        echo "🔍 Current working directory:"
        pwd
        echo "📁 Repository root contents:"
        ls -la
        echo "📁 Checking for serverless directory:"
        if [ -d "serverless" ]; then
          echo "✅ serverless directory exists"
          ls -la serverless/
        else
          echo "❌ serverless directory NOT found"
          echo "Available directories:"
          find . -type d -maxdepth 2 | head -20
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: latest

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run tests
      run: pnpm test
      continue-on-error: true

    - name: Build project
      run: VITE_API_BASE_URL=${{ secrets.API_BASE_URL }} pnpm build

    - name: Install Aliyun CLI
      run: |
        # 下载并安装阿里云 CLI
        wget https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
        tar -xzf aliyun-cli-linux-latest-amd64.tgz
        sudo mv aliyun /usr/local/bin/
        aliyun version

    - name: Configure Aliyun CLI
      env:
        ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
        ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      run: |
        aliyun configure set \
          --profile default \
          --mode AK \
          --region cn-hangzhou \
          --access-key-id "$ACCESS_KEY_ID" \
          --access-key-secret "$ACCESS_KEY_SECRET"

    - name: Deploy Backend to FC & API Gateway
      env:
        DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
        ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      run: |
        echo "🚀 Building and deploying backend..."
        echo "📍 Current directory: $(pwd)"
        echo "📁 Available files and directories:"
        ls -la

        # 确保 serverless 目录存在
        if [ ! -d "serverless" ]; then
          echo "❌ serverless directory not found!"
          echo "🔍 Searching for serverless directory..."
          find . -name "serverless" -type d 2>/dev/null || echo "No serverless directory found anywhere"
          exit 1
        fi

        echo "✅ Entering serverless directory..."
        cd serverless
        echo "📍 Now in: $(pwd)"
        echo "📁 Serverless directory contents:"
        ls -la

        echo "📦 Installing dependencies..."
        npm ci || npm i

        echo "🔨 Building FC function..."
        npm run build:fc

        echo "🗄️ Creating Tablestore tables..."
        node scripts/create_ots_tables.js

        echo "🚀 Deploying to Aliyun FC..."

        # 创建 FC 服务
        echo "📦 Creating FC service..."
        aliyun fc POST /services \
          --region cn-hangzhou \
          --body '{
            "serviceName": "tonghua-world-svc",
            "description": "Tonghua World Video Generation Service",
            "internetAccess": true
          }' || echo "Service may already exist"

        # 创建 FC 函数
        echo "⚡ Creating FC function..."
        cd fc
        zip -r function.zip .
        FUNCTION_CODE=$(base64 -w 0 function.zip)
        cd ..

        aliyun fc POST /services/tonghua-world-svc/functions \
          --region cn-hangzhou \
          --body '{
            "functionName": "api",
            "runtime": "nodejs20",
            "handler": "index.handler",
            "code": {
              "zipFile": "'$FUNCTION_CODE'"
            },
            "memorySize": 1024,
            "timeout": 120,
            "description": "API function for video generation",
            "environmentVariables": {
              "TONGYI_API_KEY": "'$DASHSCOPE_API_KEY'",
              "OSS_REGION": "cn-hangzhou",
              "OSS_BUCKET_UPLOAD": "draworld2025",
              "OSS_BUCKET_STATIC": "draworld2",
              "TABESTORE_INSTANCE": "i01wvvv53p0q",
              "OIDC_ISSUER": "https://draworld.authing.cn/oidc",
              "OIDC_JWKS": "https://draworld.authing.cn/oidc/.well-known/jwks.json",
              "OIDC_AUD": "689adde75ecb97cd396860eb",
              "ASSUME_ROLE_ARN": "acs:ram::1950683455496289:role/upload"
            }
          }' || \
        aliyun fc PUT /services/tonghua-world-svc/functions/api/code \
          --region cn-hangzhou \
          --body '{
            "zipFile": "'$FUNCTION_CODE'"
          }'

        # 创建 HTTP 触发器
        echo "🌐 Creating HTTP trigger..."
        aliyun fc POST /services/tonghua-world-svc/functions/api/triggers \
          --region cn-hangzhou \
          --body '{
            "triggerName": "httpTrigger",
            "triggerType": "http",
            "triggerConfig": {
              "authType": "anonymous",
              "methods": ["GET", "POST", "OPTIONS"]
            }
          }' || echo "Trigger may already exist"

        echo "✅ FC deployment completed!"

    - name: Deploy Frontend to OSS
      env:
        ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
        ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      run: |
        echo "🚀 Uploading frontend to OSS..."
        echo "📍 Current directory: $(pwd)"

        # 确保 dist 目录存在
        if [ ! -d "dist" ]; then
          echo "❌ dist directory not found!"
          echo "🔍 Available directories:"
          ls -la
          exit 1
        fi

        echo "📁 dist directory contents:"
        ls -la dist/

        echo "📦 Installing ossutil..."
        npm i -g ossutil

        echo "⚙️ Configuring ossutil..."
        ossutil config -e oss-cn-hangzhou.aliyuncs.com -i $ALIBABA_CLOUD_ACCESS_KEY_ID -k $ALIBABA_CLOUD_ACCESS_KEY_SECRET -L CH --force

        echo "📤 Uploading files to OSS..."
        ossutil cp -rf dist/ oss://draworld2/ --force
        echo "✅ Frontend deployment completed!"


    - name: Get deployment URL
      if: success()
      run: |
        echo "🌐 部署完成！"
        echo "前端访问地址: https://draworld2.oss-cn-hangzhou.aliyuncs.com/index.html"
        echo "API 网关地址: 请查看上方 s deploy 输出的域名"

    - name: Complete job
      if: success()
      run: |
        echo "🎉 所有部署步骤完成！"
        echo "项目已成功部署到阿里云（FC + OSS + API 网关）"
