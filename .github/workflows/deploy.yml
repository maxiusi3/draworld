name: Deploy WhimsyBrush to Firebase

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

env:
  NODE_VERSION: '18'

jobs:
  # 构建和测试作业
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: latest

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run tests
      run: pnpm test
      continue-on-error: true

    - name: Build project
      run: pnpm build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: dist/
        retention-days: 1

  # 部署作业
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-files
        path: dist/

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install Firebase CLI
      run: npm install -g firebase-tools

    - name: Create service account file
      run: |
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > service-account.json

    - name: Authenticate with Firebase
      run: |
        export GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json
        firebase --version
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      continue-on-error: true

    - name: Deploy to Firebase Hosting Only
      id: deploy
      run: |
        export GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json

        echo "🚀 开始部署Firebase Hosting..."
        # 只部署hosting，避免权限问题
        firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --non-interactive

        echo "✅ Firebase Hosting部署完成！"
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    - name: Clean up service account file
      if: always()
      run: |
        if [ -f service-account.json ]; then
          rm service-account.json
          echo "🧹 Service account file cleaned up"
        fi

    - name: Get deployment URL
      if: success()
      run: |
        echo "🌐 部署完成！"
        echo "访问地址: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"
        echo "或者: https://${{ secrets.FIREBASE_PROJECT_ID }}.firebaseapp.com"

    - name: Comment deployment URL on PR
      if: github.event_name == 'pull_request' && success()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🚀 **部署成功！**
            
            预览地址: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app
            
            构建时间: ${new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})}`
          })

    - name: Post Setup Node.js
      if: success()
      run: |
        echo "Node.js version: $(node --version)"
        echo "npm version: $(npm --version)"

    - name: Post Checkout repository
      if: success()
      run: |
        echo "Repository checked out successfully"
        echo "Current directory: $(pwd)"
        echo "Files in current directory:"
        ls -la

    - name: Complete job
      if: success()
      run: |
        echo "🎉 所有部署步骤完成！"
        echo "项目已成功部署到Firebase Hosting"
