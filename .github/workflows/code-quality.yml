name: Code Quality Check

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.15.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: TypeScript type check
      run: pnpm run type-check

    - name: ESLint code quality check
      run: pnpm run lint

    - name: Check file sizes
      run: |
        echo "🔍 检查文件大小..."
        find src -name "*.tsx" -o -name "*.ts" | grep -v node_modules | while read file; do
          lines=$(wc -l < "$file")
          if [ $lines -gt 200 ]; then
            echo "⚠️  $file: $lines 行 (超过200行限制)"
          else
            echo "✅ $file: $lines 行"
          fi
        done

    - name: Build application
      run: pnpm run build

    - name: Check build size
      run: |
        echo "📦 构建产物大小分析:"
        du -sh dist/
        find dist -name "*.js" -exec ls -lh {} \; | head -10

  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run security audit
      run: |
        npm audit --audit-level=moderate || true
        echo "🔒 安全检查完成"

    - name: Check for secrets
      run: |
        echo "🔍 检查敏感信息..."
        if grep -r "AIzaSy" src/ --exclude-dir=node_modules || true; then
          echo "⚠️  发现可能的API密钥，请检查是否应该使用环境变量"
        fi
        echo "✅ 敏感信息检查完成"
