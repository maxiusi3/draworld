name: Deploy to Aliyun (FC + OSS)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.15.0

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run tests
      run: pnpm test
      continue-on-error: true

    - name: Build project
      run: VITE_API_BASE_URL=${{ secrets.API_BASE_URL }} pnpm build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: dist/
        retention-days: 1

  # 部署作业
  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-files
        path: dist/

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install Serverless Devs
      run: npm i -g @serverless-devs/s

    - name: Deploy Backend to FC & API Gateway
      env:
        DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        ALIBABA_CLOUD_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
        ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
        ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      working-directory: ./serverless
      run: |
        echo "🚀 Building and deploying backend..."
        npm ci || npm i
        npm run build:fc
        node scripts/create_ots_tables.js
        s deploy -y

    - name: Deploy Frontend to OSS
      env:
        ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
        ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      run: |
        echo "🚀 Uploading frontend to OSS..."
        npm i -g ossutil
        ossutil config -e oss-cn-hangzhou.aliyuncs.com -i $ALIBABA_CLOUD_ACCESS_KEY_ID -k $ALIBABA_CLOUD_ACCESS_KEY_SECRET -L CH --force
        ossutil cp -rf dist/ oss://draworld2/ --force
        echo "✅ Frontend deployment completed!"


    - name: Clean up service account file
      if: always()
      run: |
        if [ -f "${{ github.workspace }}/service-account.json" ]; then
          rm "${{ github.workspace }}/service-account.json"
          echo "🧹 Service account file cleaned up"
        fi



    - name: Get deployment URL
      if: success()
      run: |
        echo "🌐 部署完成！"
        echo "访问地址: https://(请在阿里云CDN与域名控制台查看绑定域名)"

    - name: Comment deployment URL on PR
      if: github.event_name == 'pull_request' && success()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🚀 **部署成功！**
            
            预览地址: https://(阿里云CDN绑定域名)
            
            构建时间: ${new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})}`
          })

    - name: Post Setup Node.js
      if: success()
      run: |
        echo "Node.js version: $(node --version)"
        echo "npm version: $(npm --version)"

    - name: Post Checkout repository
      if: success()
      run: |
        echo "Repository checked out successfully"
        echo "Current directory: $(pwd)"
        echo "Files in current directory:"
        ls -la

    - name: Complete job
      if: success()
      run: |
        echo "🎉 所有部署步骤完成！"
        echo "项目已成功部署到阿里云（FC + OSS + API 网关）"
