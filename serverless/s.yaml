edition: 1.0.0
name: tonghua-world
access: default

services:
  api:
    component: fc
    props:
      region: cn-hangzhou
      service:
        name: tonghua-world-svc
        internetAccess: true
      function:
        name: api
        runtime: nodejs20
        codeUri: fc
        handler: index.handler
        memorySize: 1024
        timeout: 120
        environmentVariables:
          TONGYI_API_KEY: "placeholder-api-key"
          OSS_REGION: cn-hangzhou
          OSS_BUCKET_UPLOAD: draworld2025
          OSS_BUCKET_STATIC: draworld2
          TABESTORE_INSTANCE: i01wvvv53p0q
          OIDC_ISSUER: https://draworld.authing.cn/oidc
          OIDC_JWKS: https://draworld.authing.cn/oidc/.well-known/jwks.json
          OIDC_AUD: 689adde75ecb97cd396860eb
          ASSUME_ROLE_ARN: acs:ram::1950683455496289:role/upload
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods: [ 'GET', 'POST', 'OPTIONS' ]

